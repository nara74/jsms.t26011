<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 장성중학교 실시간 알리미</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: #334155;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .main-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .main-header h1 {
            font-size: 28px;
            color: #1e1b4b;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .date-picker-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eeebff;
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #dcd7ff;
        }

        .date-picker-container label {
            font-size: 15px;
            color: #4f46e5;
            font-weight: 700;
        }

        .date-input {
            border: none;
            background: transparent;
            color: #4f46e5;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meal-list, .timetable-list {
            list-style: none;
        }

        .meal-item {
            font-size: 16px;
            font-weight: 500;
            color: #334155;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .meal-item:last-child { border-bottom: none; }
        .meal-item::before { content: "✨ "; color: #6366f1; }

        .calorie-tag {
            font-size: 13px;
            color: #b45309;
            background: #fef3c7;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            margin-top: 16px;
            align-self: flex-start;
        }

        .time-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .time-item:last-child { border-bottom: none; }

        .perio-num {
            font-size: 13px;
            font-weight: 700;
            background: #cbd5e1;
            color: #475569;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .subject-name {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .loading {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-header">
            <h1>🏫 장성중학교 실시간 알리미</h1>
            <div class="date-picker-container">
                <label for="target-date">📅 조회 날짜:</label>
                <input type="date" id="target-date" class="date-input" value="2026-06-01">
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title">🍴 오늘의 중식 메뉴</div>
                <div id="meal-loading" class="loading">급식 데이터를 가져오는 중...</div>
                <ul id="meal-list" class="meal-list"></ul>
                <div id="calorie-box" class="calorie-tag" style="display: none;"></div>
            </div>

            <div class="card">
                <div class="card-title">⏱️ 2학년 4반 시간표</div>
                <div id="table-loading" class="loading">시간표 데이터를 가져오는 중...</div>
                <ul id="timetable-list" class="timetable-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const KEY = "7d5e1545fc834fe19a4a2248e6d5256d";
        const OFFICE_CODE = "J10"; 
        const SCHOOL_CODE = "7621030"; 

        async function fetchDashboardData() {
            const dateInput = document.getElementById('target-date').value;
            const targetDate = dateInput.replace(/-/g, "");

            const MEAL_API = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&MLSV_YMD=${targetDate}`;
            const TIMETABLE_API = `https://open.neis.go.kr/hub/misTimetable?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=${OFFICE_CODE}&SD_SCHUL_CODE=${SCHOOL_CODE}&ALL_TI_YMD=${targetDate}&GRADE=2&CLASS_NM=4`;

            initDisplay();

            await Promise.all([
                loadMeal(MEAL_API),
                loadTimetable(TIMETABLE_API)
            ]);
        }

        function initDisplay() {
            const mealLoading = document.getElementById('meal-loading');
            const tableLoading = document.getElementById('table-loading');
            const mealUl = document.getElementById('meal-list');
            const tableUl = document.getElementById('timetable-list');
            const calBox = document.getElementById('calorie-box');

            mealLoading.style.display = 'block';
            mealLoading.innerText = "급식 데이터를 가져오는 중...";
            tableLoading.style.display = 'block';
            tableLoading.innerText = "시간표 데이터를 가져오는 중...";

            mealUl.innerHTML = "";
            tableUl.innerHTML = "";
            calBox.style.display = 'none';
            calBox.innerText = "";
        }

        async function loadMeal(apiUrl) {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const loadingDiv = document.getElementById('meal-loading');
                const mealUl = document.getElementById('meal-list');

                if (data.mealServiceDietInfo) {
                    const row = data.mealServiceDietInfo[1].row[0];
                    let rawMenu = row.DDISH_NM;
                    
                    rawMenu = rawMenu.replace(/\([^)]*\)/g, '');
                    rawMenu = rawMenu.replace(/m/g, '');

                    const menuItems = rawMenu.split('<br/>').map(m => m.trim()).filter(m => m.length > 0);
                    
                    loadingDiv.style.display = 'none';
                    menuItems.forEach(menu => {
                        const li = document.createElement('li');
                        li.className = 'meal-item';
                        li.innerText = menu;
                        mealUl.appendChild(li);
                    });

                    const calBox = document.getElementById('calorie-box');
                    calBox.innerText = `🔥 총 칼로리: ${row.CAL_INFO}`;
                    calBox.style.display = 'inline-block';
                } else {
                    loadingDiv.innerText = "오늘은 급식 정보가 없거나 휴업일입니다. 😴";
                }
            } catch (err) {
                document.getElementById('meal-loading').innerText = "❌ 급식 데이터 통신 오류";
            }
        }

        async function loadTimetable(apiUrl) {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const loadingDiv = document.getElementById('table-loading');
                const tableUl = document.getElementById('timetable-list');

                if (data.misTimetable) {
                    const rows = data.misTimetable[1].row;
                    
                    rows.sort((a, b) => parseInt(a.PERIO) - parseInt(b.PERIO));
                    
                    loadingDiv.style.display = 'none';
                    rows.forEach(row => {
                        const li = document.createElement('li');
                        li.className = 'time-item';

                        const perioSpan = document.createElement('span');
                        perioSpan.className = 'perio-num';
                        perioSpan.innerText = row.PERIO;

                        const subjectSpan = document.createElement('span');
                        subjectSpan.className = 'subject-name';
                        subjectSpan.innerText = row.ITRT_CNTNT;

                        // 특정 교과 하이라이트 조건문을 제거하여 일반 교과 스타일로 통일했습니다.
                        li.appendChild(perioSpan);
                        li.appendChild(subjectSpan);
                        tableUl.appendChild(li);
                    });
                } else {
                    loadingDiv.innerText = "조회된 시간표 데이터가 없습니다. 🗓️";
                }
            } catch (err) {
                document.getElementById('table-loading').innerText = "❌ 시간표 데이터 통신 오류";
            }
        }

        document.getElementById('target-date').addEventListener('change', fetchDashboardData);
        fetchDashboardData();
    </script>
</body>
</html>
